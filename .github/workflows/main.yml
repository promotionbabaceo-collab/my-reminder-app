name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y docutils git fontconfig libffi-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libjpeg-dev libpango1.0-dev libpangoft2-1.0-0 libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libtool pkg-config python3-dev python3-pip python3-setuptools unzip zip zlib1g-dev autoconf automake libltdl-dev libssl-dev cmake patch openjdk-17-jdk bzip2 libsqlite3-dev sqlite3 libbz2-dev libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev uuid-dev
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Run Buildozer Init
      run: |
        buildozer init

    - name: Fix Buildozer Spec and Path Issues
      run: |
        # App details change karne ke liye
        sed -i 's/^title = .*/title = My Reminder App/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = reminderapp/' buildozer.spec
        sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
        sed -i 's/^#source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
        
        # Sdkmanager error thik karne ke liye specific versions lock karna
        sed -i 's/^#android.sdk_build_tools_version = .*/android.sdk_build_tools_version = 33.0.0/' buildozer.spec
        sed -i 's/^#android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/^#android.ndk = .*/android.ndk = 25.2.9519653/' buildozer.spec

    - name: Pre-Accept Android Licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "247a1c1766904d24a41f192214954554df551421\n84831b9409646a918e30573bab4c9c91346d8ec1\n504667f4c0de7af1a06de9f4b1727b84351f2910\nd56f5187479451eabf01fb74314b50d2481b556d\n27444a5231b390a47920e7f226b625a4722759c7\n94bb6f79a14b609d2644e86e3b367d2d1404b276\n85c1f871556350f19d288d6fd182413e1858759a" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Build Android APK with Buildozer
      run: |
        export APP_ANDROID_ARCHS="armeabi-v7a"
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
